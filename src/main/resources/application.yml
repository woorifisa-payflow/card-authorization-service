spring:
  application:
    name: card-authorization-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      encoding: UTF-8

  security:
    user:
      name: card
      password: card123

  cloud:
    stream:
      default-binder: kafka
      bindings:
        paymentApproved-out-0:
          destination: card.payment.approved
          content-type: application/json
        paymentRejected-out-0:
          destination: card.payment.rejected
          content-type: application/json
      kafka:
        binder:
          brokers: localhost:9092
          auto-create-topics: true

server:
  port: 9090
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    com.card.payment: DEBUG

# 은행 서비스 설정
bank:
  service:
    url: http://localhost:8080

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
